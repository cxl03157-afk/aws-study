- hosts: app
  become: true

# 変数定義
  vars:
    app_dir: /opt/aws-study
    app_file: app.jar

    rds_endpoint: "{{ lookup('env', 'RDS_ENDPOINT') }}"
    db_username: "{{ lookup('env', 'DB_USER_NAME') }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"

# スワップファイル作成
  tasks:
    - name: swapfile exists?
      stat:
        path: /swapfile
      register: swapfile_stat

    - name: create swap file
      command: fallocate -l 2G /swapfile
      when: not swapfile_stat.stat.exists

    - name: set swapfile permission
      file:
        path: /swapfile
        owner: root
        group: root
        mode: '0600'

    - name: format swap
      command: mkswap /swapfile
      when: not swapfile_stat.stat.exists

    - name: check active swaps
      command: swapon --show
      register: swap_status
      changed_when: false

    - name: enable swap
      command: swapon /swapfile
      when: "'/swapfile' not in swap_status.stdout"

    - name: persist swap
      lineinfile:
        path: /etc/fstab
        line: "/swapfile swap swap defaults 0 0"
        state: present

# MySQLクライアントインストール
    - name: Download MySQL repo
      get_url:
        url: https://repo.mysql.com/mysql84-community-release-el9-1.noarch.rpm
        dest: /tmp/mysql84-community-release.rpm

    - name: Import MySQL GPG key
      rpm_key:
        key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
        state: present

    - name: Install MySQL repo
      dnf:
        name: /tmp/mysql84-community-release.rpm
        state: present

    - name: Install MySQL client
      dnf:
        name:
          - mysql
          - mysql-community-client
        state: present    

#　Java21インストール
    - name: install java-21
      dnf:
        name:  java-21-amazon-corretto-devel.x86_64
        state: present

# Gitインストール
    - name: install git
      dnf:
        name:  git
        state: present

#　課題用レポジトリクローン
    - name: clone repository
      become_user: ec2-user
      git:
        repo: https://github.com/koujienami/aws-study.git
        dest: /home/ec2-user/aws-study
        force: yes

    - name: create source resources dir
      file:
        path: /home/ec2-user/aws-study/src/main/resources
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'


#　DB用設定ファイル
    - name: create app dir
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Create application.properties
      template:
        src: application.properties.j2
        dest: "{{ app_dir }}/application.properties"
        owner: ec2-user
        group: ec2-user
        mode: '0644'

#　DBへの入力
    - name: wait for RDS port
      wait_for:
        host: "{{ rds_endpoint }}"
        port: 3306
        timeout: 300

    - name: initialize database
      shell: |
        mysql -h {{ rds_endpoint }} -u {{ db_username }} <<EOF
        CREATE DATABASE IF NOT EXISTS awsstudy;
        USE awsstudy;

        CREATE TABLE IF NOT EXISTS student (
          id INT PRIMARY KEY AUTO_INCREMENT,
          name VARCHAR(255) NOT NULL
        );

        INSERT INTO student (name)
        SELECT 'Kouji Enami'
        WHERE NOT EXISTS (
          SELECT 1 FROM student WHERE name = 'Kouji Enami'
        );

        EOF 
      environment:
        MYSQL_PWD: "{{ db_password }}"


# 権限設定
    - name: change mode
      file:
        path: /home/ec2-user/aws-study/gradlew
        owner: ec2-user
        group: ec2-user
        mode: '0755'

# Jar作成
    - name: build app
      become_user: ec2-user
      command: ./gradlew bootJar
      args:
        chdir: /home/ec2-user/aws-study

    - name: find jar file
      find:
        paths: /home/ec2-user/aws-study/build/libs
        patterns: "*.jar"
        excludes: "*plain.jar"
        file_type: file
      register: jar_files

    - name: No jar file
      fail:
        msg: "Jar file was not found"
      when: jar_files.matched == 0


    - name: copy jar file
      copy:
        src: "{{ jar_files.files[0].path }}"
        dest: "{{ app_dir }}/{{ app_file }}"
        remote_src: true
        owner: ec2-user
        group: ec2-user
        mode: '0644'

# サービスファイル作成
    - name: create systemd service file
      template:
        src: aws-study.service.j2
        dest: /etc/systemd/system/aws-study.service

# アプリ起動
    - name: reload systemd
      systemd:
        daemon_reload: true

    - name: restart aws-study service
      systemd:
        name: aws-study
        state: restarted
        enabled: true

# ポート待ち時間
    - name: wait for app port
      wait_for:
        port: 8080
        host: 127.0.0.1
        delay: 3
        timeout: 60 
